name: "Publicar Imagens"

on:
  push:
    branches:
      - main
    paths:
      - "src/images/**"
      - ".github/workflows/publish-images.yaml"
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        image:
          - node
          - php
    steps:
      - uses: actions/checkout@v4

      - name: "Configurar QEMU (builds multi-arquitetura)"
        uses: docker/setup-qemu-action@v3

      - name: "Configurar Docker Buildx"
        uses: docker/setup-buildx-action@v3

      - name: "Autenticar no GHCR"
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: "Metadados (tags e labels)"
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.image }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: "Build e push da imagem '${{ matrix.image }}'"
        uses: docker/build-push-action@v6
        with:
          context: ./src/images/${{ matrix.image }}/.devcontainer
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
