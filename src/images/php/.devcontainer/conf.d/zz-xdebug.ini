; Configuração do Xdebug (a habilitação do zend_extension é feita pelo
; extension-installer em docker-php-ext-xdebug.ini). Prefixo "zz-" garante que
; estes ajustes sejam carregados depois.
;
; Performance: com "start_with_request=trigger" o Xdebug fica carregado, porém
; só entra em ação (debug/profile/trace) quando a requisição traz o gatilho
; (cookie/GET/POST XDEBUG_TRIGGER ou a variável de ambiente XDEBUG_TRIGGER).
; Assim o overhead é praticamente nulo no dia a dia.
;
; A variável de ambiente XDEBUG_MODE, se definida, tem precedência sobre
; "xdebug.mode" abaixo — use XDEBUG_MODE=off para desligar por completo ou
; XDEBUG_MODE=debug,develop,coverage para ativar mais recursos.
xdebug.mode = debug,develop
xdebug.start_with_request = trigger

; Conecta de volta ao cliente (IDE) rodando na máquina host.
xdebug.client_host = host.docker.internal
xdebug.client_port = 9003
xdebug.idekey = VSCODE

; Descobre o host do cliente a partir do cabeçalho da requisição, útil quando
; host.docker.internal não estiver disponível.
xdebug.discover_client_host = true
