; Ajustes de PHP para um ambiente de DESENVOLVIMENTO em Dev Container.
; Carregado por último (prefixo "zz-") para sobrescrever os defaults do php.ini
; e os arquivos de habilitação criados pelo extension-installer.

;--- Segurança ---------------------------------------------------------------
; Não revela a versão do PHP no header "X-Powered-By".
expose_php = Off

;--- Diagnóstico (adequado para DEV, nunca para produção) --------------------
display_errors = On
display_startup_errors = On
error_reporting = E_ALL
log_errors = On

;--- Limites confortáveis para desenvolvimento -------------------------------
memory_limit = 512M
max_execution_time = 120
upload_max_filesize = 100M
post_max_size = 108M

;--- Localização -------------------------------------------------------------
date.timezone = UTC

;--- OPcache: habilitado e ajustado para DEV ---------------------------------
; validate_timestamps=1 + revalidate_freq=0 fazem o OPcache reconferir cada
; arquivo a cada requisição, então edições no código são refletidas na hora
; (essencial em dev) sem abrir mão do cache de bytecode.
opcache.enable = 1
opcache.enable_cli = 1
opcache.memory_consumption = 256
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 20000
opcache.validate_timestamps = 1
opcache.revalidate_freq = 0
opcache.save_comments = 1

;--- JIT: desativado de propósito --------------------------------------------
; O JIT é INCOMPATÍVEL com o Xdebug (que sobrescreve zend_execute_ex()). Como
; esta imagem mantém o Xdebug carregado, deixar o JIT ligado apenas emitiria um
; warning "JIT disabled" a cada execução, sem nenhum ganho. O cache de bytecode
; do OPcache acima continua ativo e traz o principal ganho de performance.
; Para usar JIT, remova/desabilite o Xdebug e defina, ex.: opcache.jit=tracing.
opcache.jit = disable
opcache.jit_buffer_size = 0
